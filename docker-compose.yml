version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: essentia-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-essentia}
      MYSQL_USER: ${DB_USER:-essentia}
      MYSQL_PASSWORD: ${DB_PASSWORD:-essentia}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    command: ["mysqld", "--default-authentication-plugin=mysql_native_password"]
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  server:
    build: ./server
    container_name: essentia-server
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: ${PORT:-3000}
      NODE_ENV: ${NODE_ENV:-production}
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-essentia}
      DB_USER: ${DB_USER:-essentia}
      DB_PASSWORD: ${DB_PASSWORD:-essentia}
      JWT_SECRET: ${JWT_SECRET:-changeme}
    ports:
      - "3000:3000"
    networks:
      - backend

  web:
    build: ./web
    container_name: essentia-web
    depends_on:
      - server
    ports:
      - "8080:80"

volumes:
  db_data:

networks:
  backend:
    driver: bridge
