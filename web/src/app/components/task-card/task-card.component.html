<article class="card">
  <div class="flex items-start justify-between gap-3">
    <a class="flex-1" [routerLink]="['/app/tasks', task.id]">
      <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">{{ task.id }}</p>
      <h2 class="mt-1 text-lg font-semibold text-slate-900">{{ task.title }}</h2>
    </a>
    <span class="status-badge" [ngClass]="statusCopy[task.status].badge">
      <span class="status-dot" [ngClass]="statusCopy[task.status].dot"></span>
      {{ statusCopy[task.status].label }}
    </span>
  </div>

  <p class="mt-3 text-sm text-slate-600">{{ task.description }}</p>

  <div class="mt-4 flex items-center justify-between text-xs text-slate-500">
    <span class="font-medium">Criado em {{ task.createdAt | date: 'dd/MM/yyyy' }}</span>
    <div class="actions">
      <button type="button" class="edit-btn" (click)="handleEdit()" aria-label="Editar tarefa">
        ✏️
      </button>
      <button type="button" class="delete-btn" (click)="handleDelete()" aria-label="Excluir tarefa">
        🗑️
      </button>
    </div>
  </div>
</article>
