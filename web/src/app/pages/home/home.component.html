<section class="min-h-screen bg-slate-50 text-slate-900">
  <div class="w-full px-6 py-10">
    <header class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
      <div>
        <p class="text-sm font-semibold uppercase tracking-wide text-slate-500">Dashboard</p>
        <h1 class="text-2xl font-bold text-slate-900 sm:text-3xl">Seus cards</h1>
        <p class="mt-1 text-sm text-slate-600">
          Resumo das atividades em andamento, pendentes e concluídas.
        </p>
      </div>
      <div class="flex flex-wrap gap-2 text-sm font-medium">
        <button
          [ngClass]="badgeClasses()"
          type="button"
          (click)="clearFilter()"
        >
          Total {{ total }}
        </button>
        <button
          [ngClass]="badgeClasses('pending')"
          type="button"
          (click)="selectStatus('pending')"
        >
          Pendentes {{ pending }}
        </button>
        <button
          [ngClass]="badgeClasses('in_progress')"
          type="button"
          (click)="selectStatus('in_progress')"
        >
          Em andamento {{ inProgress }}
        </button>
        <button
          [ngClass]="badgeClasses('completed')"
          type="button"
          (click)="selectStatus('completed')"
        >
          Concluídas {{ completed }}
        </button>
      </div>
      <button class="logout" type="button" (click)="logout()">Sair</button>
    </header>

    <div class="mt-8 grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
      <app-task-card
        *ngFor="let task of filteredTasks(); trackBy: trackById"
        [task]="task"
        [statusCopy]="statusCopy"
        (edit)="openEditModal(task)"
        (delete)="confirmAndDelete(task)"
      />
    </div>
  </div>

  <button class="fab" type="button" (click)="openCreateModal()" aria-label="Adicionar tarefa">
    +
  </button>

  <app-task-modal
    [open]="isModalOpen()"
    [form]="form"
    [statuses]="statuses"
    [statusCopy]="statusCopy"
    [creating]="creating"
    [isEditing]="isEditing"
    (close)="closeModal()"
    (submit)="submitTask()"
  />
</section>
